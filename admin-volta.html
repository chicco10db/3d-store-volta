<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Store 3D Volta</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root{
  --bg:#16151a;--sur:#1f1e26;--card:#272630;--brd:#2e2d3a;--brd2:#3d3c4e;
  --txt:#e8e6f0;--mut:#8884a0;--hint:#504e64;
  --or:#f07030;--or-l:rgba(240,112,48,.12);--or-m:rgba(240,112,48,.28);
  --pu:#8060e8;--pu-l:rgba(128,96,232,.12);
  --gr:#28a860;--gr-l:rgba(40,168,96,.12);
  --re:#e04848;--re-l:rgba(224,72,72,.12);
  --am:#d08820;--am-l:rgba(208,136,32,.12);
  --bl:#3880e0;--bl-l:rgba(56,128,224,.12);
  --sb:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;}
.ls{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg);position:relative;overflow:hidden;}
.ls-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(240,112,48,.1) 0%,transparent 65%);}
.lb{position:relative;background:var(--sur);border:1px solid var(--brd);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:370px;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.lb-logo{width:52px;height:52px;border-radius:13px;background:var(--or);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;}
.lb-logo svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.lb h1{font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:.3rem;}
.lb-sub{color:var(--mut);font-size:.84rem;text-align:center;margin-bottom:1.75rem;}
.err{background:var(--re-l);border:1px solid rgba(224,72,72,.3);border-radius:8px;padding:8px 12px;font-size:.81rem;color:var(--re);margin-bottom:1rem;display:none;}
.lf{margin-bottom:1rem;}
.lf label{display:block;font-size:.72rem;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;}
.lf input{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:11px 14px;color:var(--txt);font-size:.9rem;outline:none;}
.lb-btn{width:100%;background:var(--or);color:#fff;border:none;padding:12px;border-radius:9px;font-weight:700;cursor:pointer;}
.app-wrap{display:none;min-height:100vh;}
.sb{width:var(--sb);background:var(--sur);border-right:1px solid var(--brd);position:fixed;left:0;top:0;bottom:0;display:flex;flex-direction:column;}
.sb-logo{padding:1.4rem 1.25rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd);}
.sb-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--or);display:flex;align-items:center;justify-content:center;}
.sb-logo-icon svg{width:17px;height:17px;stroke:#fff;stroke-width:2;}
.sb-nav{padding:.75rem;display:flex;flex-direction:column;gap:4px;}
.sl{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;color:var(--mut);font-size:.85rem;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
.sl.on{color:var(--or);background:var(--or-l);}
.main{margin-left:var(--sb);flex:1;}
.topbar{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;}
.sync-badge{font-size:.75rem;font-weight:600;color:var(--gr);}
.panel{display:none;padding:2rem;}.panel.on{display:block;}
.tw{background:var(--sur);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-top:1rem;}
.dt{width:100%;border-collapse:collapse;font-size:.85rem;}
.dt th, .dt td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--brd);}
.badge{padding:4px 8px;border-radius:6px;font-size:.7rem;font-weight:700;background:var(--bl-l);color:var(--bl);}
.btn-sm{padding:4px 8px;font-size:.75rem;border-radius:4px;cursor:pointer;border:1px solid var(--brd);background:var(--bg);color:var(--txt);}
</style>
</head>
<body>
<div id="loginPage" class="ls">
  <div class="ls-bg"></div>
  <div class="lb">
    <div class="lb-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round""")/>></svg></div>
    <h1>Admin Access</h1>
    <p class="lb-sub">Store 3D — Liceo Volta</p>
    <div id="loginError" class="err">Password errata</div>
    <div class="lf"><label>Password</label><input type="password" id="adminPwd" placeholder="••••••"></div>
    <button class="lb-btn" onclick="checkLogin()">Accedi</button>
  </div>
</div>

<div id="app" class="app-wrap">
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round""")/>></svg></div>
      <div class="sb-logo-txt">ADMIN<small>Store 3D Volta</small></div>
    </div>
    <nav class="sb-nav">
      <button class="sl on" onclick="showPanel('orders')">Ordini</button>
      <button class="sl" onclick="showPanel('products')">Prodotti</button>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar"><div id="pTitle">Ordini</div><div id="syncBadge" class="sync-badge">Sincronizzato</div></header>
    <div id="panel-orders" class="panel on"><div class="tw"><table class="dt"><thead><tr><th>Data</th><th>Cliente</th><th>Prodotti</th><th>Stato</th><th>Azioni</th></tr></thead><tbody id="ordersTable"></tbody></table></div></div>
    <div id="panel-products" class="panel"><div class="tw"><table class="dt"><thead><tr><th>Prodotto</th><th>Prezzo</th><th>Azioni</th></tr></thead><tbody id="productsTable"></tbody></table></div></div>
  </main>
</div>
<script>
const API_URL = 'https://google.com';
let ADMIN_PASS = '';

async function apiCall(action, data = {}) {
  const badge = document.getElementById('syncBadge');
  badge.innerText = 'Caricamento...';
  const params = new URLSearchParams({ action, pwd: ADMIN_PASS, data: JSON.stringify(data) });
  try {
    const r = await fetch(`${API_URL}?${params.toString()}`);
    const res = await r.json();
    badge.innerText = 'Sincronizzato';
    return res;
  } catch(e) {
    badge.innerText = 'Errore';
    return {ok:false};
  }
}

async function checkLogin() {
  const p = document.getElementById('adminPwd').value;
  ADMIN_PASS = p;
  const res = await apiCall('getProducts');
  if(res.ok) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadOrders(); loadProducts();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

async function loadOrders() {
  const res = await apiCall('getOrders');
  const tbody = document.getElementById('ordersTable');
  tbody.innerHTML = '';
  if(res.ok) res.data.forEach(o => {
    tbody.innerHTML += `<tr><td>${o.data}</td><td>${o.nome}</td><td>${o.prodotti}</td><td><span class="badge">${o.status}</span></td><td><button class="btn-sm" onclick="deleteOrder('${o.id}')">X</button></td></tr>`;
  });
}

async function loadProducts() {
  const res = await apiCall('getProducts');
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = '';
  if(res.ok) res.data.forEach(p => {
    tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.price}€</td><td><button class="btn-sm" onclick="deleteProd('${p.id}')">Elimina</button></td></tr>`;
  });
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.sl').forEach(b => b.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  event.currentTarget.classList.add('on');
  document.getElementById('pTitle').innerText = id === 'orders' ? 'Ordini' : 'Prodotti';
}

async function deleteOrder(id) { if(confirm("Eliminare?")) { await apiCall('deleteOrder', {id}); loadOrders(); } }
async function deleteProd(id) { if(confirm("Eliminare?")) { await apiCall('deleteProduct', {id}); loadProducts(); } }
</script>
</body>
</html>
